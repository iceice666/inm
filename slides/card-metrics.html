<!doctype html>
<!-- @dsCard group="Slides" name="Slide — Metrics" subtitle="Four metric tiles with APCA figures" viewport="1280x720" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="slides.css" />
<style>
  html, body { margin: 0; background: #1c171d; }
  .card-frame { width: 1280px; height: 720px; overflow: hidden; position: relative; }
</style>
</head>
<body>
  <div class="card-frame">
    <section class="slide light" data-label="Metrics">
      <p class="eyebrow">Readable by the numbers</p>
      <h2 class="s-h2" style="margin-top:16px;">APCA-informed contrast, both modes.</h2>
      <div class="metric-grid">
        <div class="m-tile"><span class="mk"><span class="dot" style="background:var(--s-accent)"></span>Body text</span><span class="mv">65</span><span class="md">APCA Lc · light</span></div>
        <div class="m-tile"><span class="mk"><span class="dot" style="background:var(--s-accent-soft)"></span>Accent</span><span class="mv">47</span><span class="md">Lc on canvas</span></div>
        <div class="m-tile"><span class="mk"><span class="dot" style="background:var(--s-cool)"></span>Body, dark</span><span class="mv">-82</span><span class="md">APCA Lc · dark</span></div>
        <div class="m-tile"><span class="mk"><span class="dot" style="background:var(--s-muted)"></span>Chroma</span><span class="mv">Low</span><span class="md">0.01–0.07 OKLCH</span></div>
      </div>
      <div class="s-foot"><span>inm — contrast</span><span class="pg">05</span></div>
    </section>
  </div>
</body>
</html>
