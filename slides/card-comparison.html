<!doctype html>
<!-- @dsCard group="Slides" name="Slide — Comparison" subtitle="Light vs dark framed panels side by side" viewport="1280x720" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="slides.css" />
<style>
  html, body { margin: 0; background: #1c171d; }
  .card-frame { width: 1280px; height: 720px; overflow: hidden; position: relative; }
</style>
</head>
<body>
  <div class="card-frame">
    <section class="slide light" data-label="Light vs dark">
      <p class="eyebrow">Same roles, two moods</p>
      <h2 class="s-h2" style="margin:16px 0 28px;">Light and dark share the same behavior.</h2>
      <div class="cmp">
        <div class="cmp-panel light">
          <div class="cmp-bar"><span>Light mode</span><div class="cmp-dots"><span></span><span></span><span></span></div></div>
          <div class="cmp-body">
            <div class="cmp-row"><span class="cd"></span><span class="ct">Editorial workspace</span><span class="ca">Active</span></div>
            <div class="cmp-row"><span class="cd"></span><span class="ct">Dashboard controls</span><span class="ca">Review</span></div>
            <div class="cmp-row"><span class="cd"></span><span class="ct">Portfolio index</span><span class="ca">Ready</span></div>
            <span class="cmp-btn">Apply palette</span>
          </div>
        </div>
        <div class="cmp-panel dark">
          <div class="cmp-bar"><span>Dark mode</span><div class="cmp-dots"><span></span><span></span><span></span></div></div>
          <div class="cmp-body">
            <div class="cmp-row"><span class="cd"></span><span class="ct">Creative console</span><span class="ca">Live</span></div>
            <div class="cmp-row"><span class="cd"></span><span class="ct">Review queue</span><span class="ca">Open</span></div>
            <div class="cmp-row"><span class="cd"></span><span class="ct">Status stream</span><span class="ca">Synced</span></div>
            <span class="cmp-btn">Apply palette</span>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
