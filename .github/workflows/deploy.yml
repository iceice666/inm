name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            deck/package-lock.json

      # Builds the site + open-slide deck, rebrands the deck favicon/title, and
      # copies the deck into site/dist/slide. See root package.json `build`.
      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e8967a3a38d6fc00dbddd967d90a16fc
          # Project name (inm) and output dir (site/dist) come from wrangler.toml.
          command: pages deploy
