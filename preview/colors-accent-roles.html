<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { border: 1px solid var(--border); border-radius: var(--radius-control); overflow: hidden; background: var(--surface); }
  .fill { height: 70px; display: flex; align-items: flex-end; padding: 10px; }
  .tag { font-size: 12px; font-weight: 780; }
  .meta { padding: 10px 12px; }
  .role { font-size: 13px; font-weight: 740; color: var(--text); }
  .desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="fill" style="background:var(--accent)"><span class="tag" style="color:var(--on-accent)">accent</span></div>
      <div class="meta"><div class="role">Action signal</div><div class="desc">Buttons, links, active controls</div></div>
    </div>
    <div class="card">
      <div class="fill" style="background:var(--accent-soft)"><span class="tag" style="color:var(--on-accent)">accent-soft</span></div>
      <div class="meta"><div class="role">Hover &amp; decor</div><div class="desc">Hover borders, soft fills</div></div>
    </div>
    <div class="card">
      <div class="fill" style="background:var(--cool)"><span class="tag" style="color:var(--bg)">cool</span></div>
      <div class="meta"><div class="role">Support tone</div><div class="desc">Quiet statuses, metadata</div></div>
    </div>
  </div>
</body>
</html>
