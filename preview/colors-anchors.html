<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border); border-radius: var(--radius-control); overflow: hidden; background: var(--surface); box-shadow: var(--shadow-item); }
  .fill { height: 96px; }
  .meta { padding: 10px 12px; }
  .name { font-size: 14px; font-weight: 780; color: var(--text); }
  .hex { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="fill" style="background:#3E343F"></div><div class="meta"><div class="name">Plum Black</div><div class="hex">#3E343F</div></div></div>
    <div class="sw"><div class="fill" style="background:#A1736B"></div><div class="meta"><div class="name">Clay Rose</div><div class="hex">#A1736B</div></div></div>
    <div class="sw"><div class="fill" style="background:#979F9B"></div><div class="meta"><div class="name">Mist Gray</div><div class="hex">#979F9B</div></div></div>
    <div class="sw"><div class="fill" style="background:#C9BFB6"></div><div class="meta"><div class="name">Warm Stone</div><div class="hex">#C9BFB6</div></div></div>
  </div>
</body>
</html>
