<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 24px; color: var(--text); }
  .row { display: flex; align-items: center; gap: 28px; }
  .tile { display: inline-grid; place-items: center; width: 72px; height: 72px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-control); background: var(--raised); }
  .tile img { width: 100%; height: 100%; }
  .lockup { display: inline-flex; align-items: center; gap: 12px; }
  .lockup img { width: 40px; height: 40px; padding: 5px; border: 1px solid var(--border); border-radius: var(--radius-control); background: var(--raised); }
  .lockup span { font-size: 30px; font-weight: 820; }
  .cap { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <span class="tile"><img src="../assets/icon.svg" alt="inm logo mark" /></span>
    <span class="lockup"><img src="../assets/icon.svg" alt="" /><span>inm</span></span>
  </div>
  <div class="cap">Four overlapping anchor blobs · always lowercase wordmark · mark sits in a raised tile with 1px border</div>
</body>
</html>
