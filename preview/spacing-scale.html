<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 24px; color: var(--text); }
  .lab { font-size: 12px; font-weight: 760; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .scale { display: flex; align-items: flex-end; gap: 10px; }
  .col { display: grid; gap: 6px; justify-items: center; }
  .bar { background: var(--accent); border-radius: var(--radius-inner); width: 100%; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 700; }
  .b { width: 28px; }
</style>
</head>
<body>
  <div class="lab">Spacing — base unit 4px</div>
  <div class="scale">
    <div class="col"><div class="bar b" style="height:4px"></div><span class="v">4</span></div>
    <div class="col"><div class="bar b" style="height:8px"></div><span class="v">8</span></div>
    <div class="col"><div class="bar b" style="height:12px"></div><span class="v">12</span></div>
    <div class="col"><div class="bar b" style="height:16px"></div><span class="v">16</span></div>
    <div class="col"><div class="bar b" style="height:24px"></div><span class="v">24</span></div>
    <div class="col"><div class="bar b" style="height:32px"></div><span class="v">32</span></div>
    <div class="col"><div class="bar b" style="height:44px"></div><span class="v">44</span></div>
    <div class="col"><div class="bar b" style="height:54px"></div><span class="v">54</span></div>
    <div class="col"><div class="bar b" style="height:64px"></div><span class="v">64</span></div>
    <div class="col"><div class="bar b" style="height:72px"></div><span class="v">72</span></div>
  </div>
</body>
</html>
