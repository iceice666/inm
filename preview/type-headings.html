<!-- @dsCard group="Type" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); padding: 24px; color: var(--text); }
  .stack { display: grid; gap: 14px; }
  .item { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; border-bottom: 1px solid color-mix(in oklch, var(--border) 70%, transparent); padding-bottom: 12px; }
  .item:last-child { border-bottom: 0; }
  .spec { letter-spacing: 0; }
  .h1 { font-size: 44px; font-weight: 800; line-height: 1; }
  .h2 { font-size: 30px; font-weight: 800; line-height: 1.05; }
  .h3 { font-size: 20px; font-weight: 760; line-height: 1.2; }
  .meta-l { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }
</style>
</head>
<body>
  <div class="stack">
    <div class="item"><span class="spec h1">Heading one</span><span class="meta-l">48–72 / 800</span></div>
    <div class="item"><span class="spec h2">Heading two</span><span class="meta-l">28–48 / 800</span></div>
    <div class="item"><span class="spec h3">Heading three</span><span class="meta-l">17–22 / 760</span></div>
  </div>
</body>
</html>
