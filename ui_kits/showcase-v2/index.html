<!doctype html>
<!-- @dsCard group="UI Kit — Showcase V2" name="inm landing page" subtitle="Reworked showcase — editorial color-system reference" -->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>inm — color system</title>
  <link rel="icon" href="../../assets/icon.svg" />
  <link rel="stylesheet" href="showcase.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="14" fill="#C9BFB6" />
      <rect x="30" y="30" width="19" height="40" rx="3" fill="#3E343F" />
      <rect x="51" y="30" width="19" height="19" rx="3" fill="#A1736B" />
      <rect x="51" y="51" width="19" height="19" rx="3" fill="#979F9B" />
      <rect x="30" y="72" width="40" height="0" rx="3" fill="#3E343F" />
    </svg>
  </template>

  <script type="text/babel" src="Brand.jsx"></script>
  <script type="text/babel" src="HeaderV2.jsx"></script>
  <script type="text/babel" src="HeroV2.jsx"></script>
  <script type="text/babel" src="Anchors.jsx"></script>
  <script type="text/babel" src="Tokens.jsx"></script>
  <script type="text/babel" src="Modes.jsx"></script>
  <script type="text/babel" src="Principles.jsx"></script>
  <script type="text/babel" src="Install.jsx"></script>
  <script type="text/babel" src="UIKit.jsx"></script>
  <script type="text/babel" src="SlidesShowcase.jsx"></script>
  <script type="text/babel">
    function App() {
      const [theme, setTheme] = React.useState(
        document.documentElement.dataset.theme || "light"
      );
      const toggle = () => {
        const next = theme === "dark" ? "light" : "dark";
        setTheme(next);
        document.documentElement.dataset.theme = next;
      };
      return (
        <React.Fragment>
          <HeaderV2 theme={theme} onToggle={toggle} />
          <main>
            <HeroV2 />
            <Anchors />
            <Tokens />
            <Modes />
            <Principles />
            <Install />
            <UIKit />
            <SlidesShowcase />
          </main>
          <Footer />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
