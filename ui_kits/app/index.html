<!doctype html>
<!-- @dsCard group="UI Kit — App" name="App (console) UI kit" subtitle="inm console dashboard — sidebar, metrics, filterable rows, theme toggle" viewport="1200x720" -->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>inm console — app UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="Overview.jsx"></script>
  <script type="text/babel">
    const SEED = [
      { id: 1, title: "Editorial workspace", meta: "Muted surfaces, clear text", edited: "2h ago", status: "Active" },
      { id: 2, title: "Dashboard controls", meta: "Clay for intent, mist for state", edited: "5h ago", status: "Review" },
      { id: 3, title: "Portfolio index", meta: "Warm canvas, compact rhythm", edited: "1d ago", status: "Ready" },
      { id: 4, title: "Creative console", meta: "Dark without pure black glare", edited: "1d ago", status: "Active" },
      { id: 5, title: "Status stream", meta: "Cool support for quiet signals", edited: "3d ago", status: "Ready" },
      { id: 6, title: "Review queue", meta: "Soft accent, steady borders", edited: "4d ago", status: "Review" },
    ];

    const TITLES = {
      overview: "Overview", workspaces: "Workspaces", queue: "Review queue",
      library: "Library", settings: "Settings",
    };

    function App() {
      const [theme, setTheme] = React.useState(document.documentElement.dataset.theme || "light");
      const [active, setActive] = React.useState("overview");
      const [rows, setRows] = React.useState(SEED);

      const toggle = () => {
        const next = theme === "dark" ? "light" : "dark";
        setTheme(next);
        document.documentElement.dataset.theme = next;
      };
      const addWorkspace = () => {
        const n = rows.length + 1;
        setRows([{ id: Date.now(), title: "Untitled workspace " + n, meta: "New — pick a canvas and accent", edited: "just now", status: "Active" }, ...rows]);
      };

      return (
        <div className="app">
          <Sidebar active={active} onNavigate={setActive} />
          <div className="main">
            <TopBar title={TITLES[active]} theme={theme} onToggle={toggle} onNew={addWorkspace} />
            <Overview rows={rows} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
