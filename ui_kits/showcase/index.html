<!doctype html>
<!-- @dsCard group="UI Kit — Showcase" name="Showcase UI kit" subtitle="inm palette showcase site — hero, palette, modes, usage" viewport="1280x760" -->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>inm — showcase UI kit</title>
  <link rel="stylesheet" href="showcase.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Palette.jsx"></script>
  <script type="text/babel" src="ModePreview.jsx"></script>
  <script type="text/babel" src="Usage.jsx"></script>
  <script type="text/babel">
    function App() {
      const [theme, setTheme] = React.useState(
        document.documentElement.dataset.theme || "light"
      );
      const toggle = () => {
        const next = theme === "dark" ? "light" : "dark";
        setTheme(next);
        document.documentElement.dataset.theme = next;
      };
      return (
        <React.Fragment>
          <Header theme={theme} onToggle={toggle} />
          <main id="top">
            <Hero />
            <Palette />
            <ModePreview />
            <Usage />
          </main>
          <Footer />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
